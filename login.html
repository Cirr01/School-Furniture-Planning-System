<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – School Furniture Planning System</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <link rel="stylesheet" href="dark.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #003a8f 0%, #002c6b 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      border-radius: 20px;
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .logo-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 28px;
    }
    .logo-row img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      background: #f0f4ff;
      border-radius: 10px;
      padding: 5px;
    }
    .logo-row h1 {
      font-size: 15px;
      color: #003a8f;
      line-height: 1.3;
    }
    .logo-row p {
      font-size: 12px;
      color: #6b7280;
      margin-top: 2px;
    }
    h2 {
      font-size: 22px;
      color: #1f2937;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 28px;
    }
    .field {
      margin-bottom: 18px;
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #6b7280;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .field input {
      width: 100%;
      border: 1px solid #d6deea;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      color: #1f2937;
      background: #fff;
      transition: border-color 0.15s;
    }
    .field input:focus {
      outline: none;
      border-color: #003a8f;
      box-shadow: 0 0 0 3px rgba(0,58,143,0.1);
    }
    .btn {
      width: 100%;
      background: #003a8f;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s;
    }
    .btn:hover { background: #002c6b; }
    .btn:disabled { background: #9ca3af; cursor: not-allowed; }
    .error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .footer {
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
      margin-top: 24px;
    }

    html.dark body {
      background: linear-gradient(135deg, #0a1628 0%, #060e1f 100%);
    }
    html.dark .card {
      background: #1a1d27;
      border: 1px solid #2e3347;
    }
    html.dark h2 { color: #e8eaf0; }
    html.dark .subtitle { color: #8b92a8; }
    html.dark .field label { color: #8b92a8; }
    html.dark .field input {
      background: #1e2235;
      border-color: #2e3347;
      color: #e8eaf0;
    }
    html.dark .field input:focus {
      border-color: #4d7fff;
      box-shadow: 0 0 0 3px rgba(77,127,255,0.15);
    }
    html.dark .logo-row h1 { color: #93c5fd; }
    html.dark .logo-row p { color: #8b92a8; }
    html.dark .footer { color: #4b5563; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <img src="deped_logo.png" alt="DepEd Logo">
      <div>
        <h1>School Furniture<br>Planning System</h1>
        <p>Department of Education</p>
      </div>
    </div>

    <h2>Sign in</h2>
    <p class="subtitle">Enter your username and password to continue.</p>

    <div class="error" id="errorMsg"></div>

    <form id="loginForm">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="e.g. admin1" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn" id="loginBtn">Sign in</button>
    </form>

    <div class="footer">Legazpi City Division &nbsp;·&nbsp; DepEd Region V</div>
  </div>

  <script>
    // If already logged in, go straight to dashboard
    _db.auth.getSession().then(({ data: { session } }) => {
      if (session) window.location.href = 'index.html';
    });

    const form = document.getElementById('loginForm');
    const errorMsg = document.getElementById('errorMsg');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.style.display = 'none';
      loginBtn.disabled = true;
      loginBtn.textContent = 'Signing in…';

      const username = document.getElementById('username').value.trim().toLowerCase();
      const password = document.getElementById('password').value;

      // Usernames are stored as username@deped.local in Supabase Auth
      const email = `${username}@deped.local`;

      const { error } = await _db.auth.signInWithPassword({ email, password });

      if (error) {
        errorMsg.textContent = 'Invalid username or password. Please try again.';
        errorMsg.style.display = 'block';
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign in';
        return;
      }

      window.location.href = 'index.html';
    });
  </script>
  <script src="theme.js"></script>
</body>
</html>
